# Configuração de deploy no Railway.
# "numReplicas = 1" e nenhuma configuração de autoscaling: o serviço roda como
# uma única instância fixa (nos planos Hobby/Trial isso já é o padrão — não
# existe escala automática nesses planos). Não ative "Autoscaling" no painel
# do Railway se quiser manter o custo previsível.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/health"
healthcheckTimeout = 30
