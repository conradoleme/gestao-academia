services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: senha_local_dev
      DB_NAME: academia
      JWT_SECRET: troque-este-segredo-localmente
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - ./public:/app/public

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: senha_local_dev
      MYSQL_DATABASE: academia
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psenha_local_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
